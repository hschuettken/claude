version: '3.8'

services:
  memora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memora-transcription
    ports:
      - "8071:8071"
    environment:
      # Model configuration
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-auto}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-default}
      
      # Server configuration
      PORT: 8071
      HOST: 0.0.0.0
    
    volumes:
      # Optional: mount cache for model persistence
      - whisper_cache:/root/.cache/huggingface
    
    restart: unless-stopped
    
    # Optional: GPU support (uncomment if CUDA available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8071/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  whisper_cache:
    driver: local

networks:
  default:
    name: claude-network
    driver: bridge
