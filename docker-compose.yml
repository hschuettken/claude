services:
  # =============================================================
  # Infrastructure services
  # =============================================================

  # mqtt: removed — using external MQTT at 192.168.0.73

  # Uncomment if you want to run InfluxDB locally (skip if external)
  # influxdb:
  #   image: influxdb:2
  #   restart: unless-stopped
  #   ports:
  #     - "8086:8086"
  #   volumes:
  #     - influxdb_data:/var/lib/influxdb2
  #   environment:
  #     DOCKER_INFLUXDB_INIT_MODE: setup
  #     DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USER:-admin}
  #     DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD:-changeme}
  #     DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-homelab}
  #     DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-homeassistant}
  #   networks:
  #     - homelab

  # Uncomment to enable local AI with Ollama
  # ollama:
  #   image: ollama/ollama:latest
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   # Uncomment for GPU passthrough (NVIDIA):
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]
  #   networks:
  #     - homelab

  # =============================================================
  # Application services — add your services below
  # =============================================================

  pv-forecast:
    build:
      context: .
      dockerfile: services/pv-forecast/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - pv_forecast_data:/app/data
    networks:
      - homelab

  smart-ev-charging:
    build:
      context: .
      dockerfile: services/smart-ev-charging/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - smart_ev_charging_data:/app/data
    networks:
      - homelab

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONPATH: "/app:/app/shared"
      CHROMA_AUTH_TOKEN: ${CHROMA_AUTH_TOKEN:-}
      CHROMA_URL: http://llm-chromadb:8000
    ports:
      - "8050:8100"
    volumes:
      - orchestrator_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homelab-orchestrator-api.rule=Host(`${TRAEFIK_ORCHESTRATOR_HOST:-api.local.schuettken.net}`)"
      - "traefik.http.routers.homelab-orchestrator-api.entrypoints=${TRAEFIK_ENTRYPOINT:-https}"
      - "traefik.http.routers.homelab-orchestrator-api.tls=true"
      - "traefik.http.services.homelab-orchestrator-api.loadbalancer.server.port=8100"
    networks:
      - homelab
      - traefik
      - chromadb

  ev-forecast:
    build:
      context: .
      dockerfile: services/ev-forecast/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ev_forecast_data:/app/data
    networks:
      - homelab

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8085:8085"
    volumes:
      - dashboard_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homelab-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST:-cockpit.local.schuettken.net}`)"
      - "traefik.http.routers.homelab-dashboard.entrypoints=${TRAEFIK_ENTRYPOINT:-https}"
      - "traefik.http.routers.homelab-dashboard.tls=true"
      - "traefik.http.services.homelab-dashboard.loadbalancer.server.port=8085"
    networks:
      - homelab
      - traefik

  ollama-router:
    build:
      context: ./services/ollama-router
    container_name: claude-ollama-router-1
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./services/ollama-router/config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - homelab

  hems:
    build:
      context: .
      dockerfile: services/hems/Dockerfile
    container_name: claude-hems-1
    restart: unless-stopped
    env_file: .env
    environment:
      HEMS_MODE: ${HEMS_MODE:-auto}
      HEMS_DB_URL: ${HEMS_DB_URL:-postgresql://homelab:homelab@192.168.0.80:5432/homelab}
      HEMS_ORCHESTRATOR_URL: ${HEMS_ORCHESTRATOR_URL:-http://orchestrator:8000}
      HEMS_HA_TOKEN: ${HEMS_HA_TOKEN:-}
    ports:
      - "8210:8210"
    volumes:
      - hems_data:/app/data
    networks:
      - homelab

  marketing-agent:
    build:
      context: .
      dockerfile: services/marketing-agent/Dockerfile
    container_name: claude-marketing-agent-1
    restart: unless-stopped
    env_file: .env
    environment:
      MARKETING_DB_URL: ${MARKETING_DB_URL:-postgresql://homelab:homelab@192.168.0.80:5432/homelab}
      GHOST_URL: ${GHOST_URL:-https://layer8.schuettken.net}
      GHOST_ADMIN_API_KEY: ${GHOST_ADMIN_API_KEY:-}
      MARKETING_PORT: ${MARKETING_PORT:-8211}
      NATS_URL: ${NATS_URL:-nats://192.168.0.50:4222}
      SEARXNG_URL: ${SEARXNG_URL:-http://192.168.0.84:8888}
      NEO4J_URL: ${NEO4J_URL:-bolt://192.168.0.88:7687}
    ports:
      - "${MARKETING_PORT:-8211}:${MARKETING_PORT:-8211}"
    volumes:
      - marketing_agent_data:/app/data
    networks:
      - homelab

  cognitive-layer:
    build:
      context: .
      dockerfile: services/cognitive-layer/Dockerfile
    container_name: claude-cognitive-layer-1
    restart: unless-stopped
    env_file: .env
    environment:
      COGNITIVE_DB_URL: ${COGNITIVE_DB_URL:-postgresql://homelab:homelab@192.168.0.80:5432/homelab}
      LLM_ROUTER_URL: ${LLM_ROUTER_URL:-http://192.168.0.50:8070}
      COGNITIVE_LLM_MODEL: ${COGNITIVE_LLM_MODEL:-qwen2.5:3b}
      NATS_URL: ${NATS_URL:-nats://192.168.0.50:4222}
      NB9OS_API_URL: ${NB9OS_API_URL:-http://192.168.0.50:8060}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-hschuettken}
      COGNITIVE_PORT: ${COGNITIVE_PORT:-8230}
    ports:
      - "${COGNITIVE_PORT:-8230}:8230"
    volumes:
      - cognitive_layer_data:/app/data
    networks:
      - homelab

  agent-economy:
    build:
      context: .
      dockerfile: services/agent-economy/Dockerfile
    container_name: claude-agent-economy-1
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_ECONOMY_DB_URL: ${AGENT_ECONOMY_DB_URL:-postgresql://homelab:homelab@192.168.0.80:5432/homelab}
      NATS_URL: ${NATS_URL:-nats://192.168.0.50:4222}
      AGENT_ECONOMY_JWT_SECRET: ${AGENT_ECONOMY_JWT_SECRET:-changeme-in-production}
      AGENT_ECONOMY_PORT: ${AGENT_ECONOMY_PORT:-8240}
      ORACLE_URL: ${ORACLE_URL:-http://192.168.0.50:8225}
    ports:
      - "${AGENT_ECONOMY_PORT:-8240}:8240"
    volumes:
      - agent_economy_data:/app/data
    networks:
      - homelab

  digital-twin:
    build:
      context: .
      dockerfile: services/digital-twin/Dockerfile
    container_name: claude-digital-twin-1
    restart: unless-stopped
    env_file: .env
    environment:
      DIGITAL_TWIN_DB_URL: ${DIGITAL_TWIN_DB_URL:-postgresql://homelab:homelab@192.168.0.80:5432/homelab}
      NATS_URL: ${NATS_URL:-nats://192.168.0.50:4222}
      HA_URL: ${HA_URL:-http://192.168.0.40:8123}
      HA_TOKEN: ${HA_TOKEN:-}
      INFLUXDB_URL: ${INFLUXDB_URL:-http://192.168.0.66:8086}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-nb9}
      ORACLE_URL: ${ORACLE_URL:-http://192.168.0.50:8225}
      DIGITAL_TWIN_PORT: ${DIGITAL_TWIN_PORT:-8238}
    ports:
      - "${DIGITAL_TWIN_PORT:-8238}:8238"
    volumes:
      - digital_twin_data:/app/data
    networks:
      - homelab

  self-optimizing-infra:
    build:
      context: .
      dockerfile: services/self-optimizing-infra/Dockerfile
    container_name: claude-self-optimizing-infra-1
    restart: unless-stopped
    env_file: .env
    environment:
      SOI_DB_URL: ${SOI_DB_URL:-postgresql://homelab:homelab@192.168.0.80:5432/homelab}
      NATS_URL: ${NATS_URL:-nats://192.168.0.50:4222}
      ORACLE_URL: ${ORACLE_URL:-http://192.168.0.50:8225}
      SOI_PORT: ${SOI_PORT:-8242}
      PROXMOX_URL: ${PROXMOX_URL:-https://192.168.0.10:8006}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID:-}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET:-}
      BOOTSTRAP_URL: ${BOOTSTRAP_URL:-http://192.168.0.50:8235}
      OPS_BRIDGE_URL: ${OPS_BRIDGE_URL:-http://192.168.0.50:8220}
      OPS_BRIDGE_TOKEN: ${OPS_BRIDGE_TOKEN:-}
      K3S_API_URL: ${K3S_API_URL:-https://192.168.0.60:6443}
      K3S_TOKEN: ${K3S_TOKEN:-}
      SOI_CHAOS_ENABLED: ${SOI_CHAOS_ENABLED:-false}
    ports:
      - "${SOI_PORT:-8242}:8242"
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homelab-soi.rule=Host(`soi.local.schuettken.net`)"
      - "traefik.http.services.homelab-soi.loadbalancer.server.port=8242"

  life-nav:
    build:
      context: .
      dockerfile: services/life-nav/Dockerfile
    container_name: claude-life-nav-1
    restart: unless-stopped
    env_file: .env
    environment:
      LIFE_NAV_DB_URL: ${LIFE_NAV_DB_URL:-postgresql://homelab:homelab@192.168.0.80:5432/homelab}
      NATS_URL: ${NATS_URL:-nats://192.168.0.50:4222}
      ORACLE_URL: ${ORACLE_URL:-http://192.168.0.50:8225}
      LIFE_NAV_PORT: ${LIFE_NAV_PORT:-8243}
      LIFE_NAV_USER: ${LIFE_NAV_USER:-henning}
    ports:
      - "${LIFE_NAV_PORT:-8243}:8243"
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homelab-life-nav.rule=Host(`life-nav.local.schuettken.net`)"
      - "traefik.http.services.homelab-life-nav.loadbalancer.server.port=8243"

  # --- Template for new services ---
  # my-new-service:
  #   build:
  #     context: .
  #     dockerfile: services/my-new-service/Dockerfile
  #   restart: unless-stopped
  #   env_file: .env
  #   volumes:
  #   depends_on:
  #     - mqtt
  #   networks:
  #     - homelab

# =============================================================
# Volumes & Networks
# =============================================================

volumes:
  hems_data:
  marketing_agent_data:
  cognitive_layer_data:
  agent_economy_data:
  digital_twin_data:
  self_optimizing_infra_data:
  pv_forecast_data:
  smart_ev_charging_data:
  ev_forecast_data:
  orchestrator_data:
  dashboard_data:
  # mosquitto_data: removed — using external MQTT
  # influxdb_data:
  # ollama_data:

networks:
  homelab:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
  chromadb:
    external: true
    name: atlas_helper_tools_websearch-net
