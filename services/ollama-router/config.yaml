nodes:
  - name: hm50
    url: http://192.168.0.XX:11434
    tags: [weak, embeddings]
    max_concurrent: 2
    default_models: [nomic-embed-text, "qwen2.5:7b-q4_K_M"]
  - name: intel-12900hk
    url: http://192.168.0.YY:11434
    tags: [strong, cpu-only]
    max_concurrent: 2
    default_models: ["qwen2.5:32b-q4_K_M"]
  - name: amd-8945hs
    url: http://192.168.0.ZZ:11434
    tags: [medium, igpu]
    max_concurrent: 3
    default_models: ["qwen2.5:7b-q4_K_M", "qwen2.5-coder:7b-q4_K_M"]

routing:
  default_strategy: model_affinity
  task_model_map:
    fast: ["qwen2.5:7b-q4_K_M", "llama3.1:8b-q4_K_M"]
    deep: ["qwen2.5:32b-q4_K_M", "qwen2.5:14b-q4_K_M"]
    code: ["qwen2.5-coder:14b-q4_K_M", "qwen2.5-coder:7b-q4_K_M"]
    embedding: [nomic-embed-text, mxbai-embed-large]
    reasoning: ["deepseek-r1:14b-q4_K_M", "qwen2.5:32b-q4_K_M"]

lifecycle:
  idle_unload_minutes: 15
  preload_on_startup: true
  auto_pull: false
  health_check_interval: 10

metrics:
  enabled: true
  prometheus_path: /metrics

server:
  host: "0.0.0.0"
  port: 11434
