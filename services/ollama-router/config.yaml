nodes:
  - name: ollama-gd90
    url: http://192.168.0.92:11434
    tags: [strong, cpu-only, primary]
    max_concurrent: 2
    default_models: ["mistral:7b", nomic-embed-text]
  - name: ollama-hm50
    url: http://192.168.0.91:11434
    tags: [weak, embeddings, secondary]
    max_concurrent: 2
    default_models: ["mistral:7b", "llama3.2:3b"]
  - name: ollama-um890
    url: http://192.168.0.26:11434
    tags: [medium, igpu]
    max_concurrent: 3
    default_models: ["qwen2.5:3b", nomic-embed-text]

routing:
  default_strategy: model_affinity
  task_model_map:
    fast: ["qwen2.5:3b", "llama3.2:3b", "mistral:7b"]
    deep: ["mistral:7b"]
    code: ["mistral:7b"]
    embedding: [nomic-embed-text]
    reasoning: ["mistral:7b"]

lifecycle:
  idle_unload_minutes: 15
  preload_on_startup: true
  auto_pull: false
  health_check_interval: 10

metrics:
  enabled: true
  prometheus_path: /metrics

server:
  host: "0.0.0.0"
  port: 11434
  metrics_port: 9090

